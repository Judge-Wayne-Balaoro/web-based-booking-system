<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palacio Feliz - Make a Reservation</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

    <header>
        <h1>Palacio Feliz Resort</h1>
        <p>Complete your reservation details below.</p>
    </header>

    <main>
        <section class="booking-card">
            <h2>Booking Form</h2>
            
            <form id="bookingForm">
                <div class="form-group">
                    <label for="guest_name">Full Name:</label>
                    <input type="text" id="guest_name" name="guest_name" required>
                </div>

                <div class="form-group">
                    <label for="contact_number">Contact Number:</label>
                    <input type="text" id="contact_number" name="contact_number" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="event_date">Event Date:</label>
                    <input type="date" id="book_event_date" name="event_date" required>
                </div>

                <div class="form-group">
                    <label for="pax">Number of Guests (Max 50):</label>
                    <input type="number" id="pax" name="pax" min="1" max="50" required>
                </div>

                <div class="form-group">
                    <label for="payment_method">Payment Method:</label>
                    <select id="payment_method" name="payment_method" style="padding: 0.8rem; border: 1px solid #ccc; border-radius: 4px;" required>
                        <option value="GCASH">GCash</option>
                        <option value="CASH">Bank Transfer</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="deposit_amount">Deposit Amount (Minimum ₱2000):</label>
                    <input type="number" id="deposit_amount" name="deposit_amount" min="2000" required>
                </div>

                <div class="form-group">
                    <label for="receipt">Upload Proof of Payment:</label>
                    <input type="file" id="receipt" name="receipt" accept="image/*" required>
                </div>

                <button type="submit" id="submitBookingBtn">Submit Booking</button>
            </form>

            <div id="bookingResult" class="result-message hidden"></div>
            
            <div id="trackingSection" class="hidden" style="margin-top: 20px;">
                <h3>Your Booking Code: <span id="displayBookingCode" style="color: #e74c3c;"></span></h3>
                <p>Please save this code to track your reservation status.</p>
                <a href="/track.html" class="button-link">Track Booking</a>
            </div>
            
            <a href="/" style="display: block; margin-top: 15px; text-decoration: none; color: #3498db;">&larr; Back to Availability Checker</a>
        </section>
    </main>

    <script src="/assets/js/book.js"></script>
</body>
</html>
