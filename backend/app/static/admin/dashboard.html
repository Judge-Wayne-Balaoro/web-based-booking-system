<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Palacio Feliz</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        /* Table styling for the dashboard */
        .dashboard-container { max-width: 1000px; margin: 0 auto; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #2c3e50; color: white; }
        .action-btn { padding: 5px 10px; font-size: 0.9rem; margin-right: 5px; width: auto; }
        .btn-approve { background-color: #27ae60; }
        .btn-reject { background-color: #e74c3c; }
        
        /* Modal (Popup) styling for viewing the receipt */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; max-width: 500px; text-align: center; }
        .modal-content img { max-width: 100%; height: auto; margin-bottom: 15px; }
        .close-btn { background-color: #333; }
    </style>
</head>
<body>

    <header>
        <h1>Palacio Feliz Admin Dashboard</h1>
        <button id="logoutBtn" style="width: auto; padding: 5px 15px; background: #e74c3c; position: absolute; top: 20px; right: 20px;">Log Out</button>
    </header>

    <main class="dashboard-container">
        <section class="booking-card" style="max-width: 100%;">
            <h2>Manage Reservations</h2>
            
            <div id="dashboardResult" class="result-message hidden"></div>

            <div style="overflow-x: auto;">
                <table id="bookingsTable">
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Guest Name</th>
                            <th>Date</th>
                            <th>Pax</th>
                            <th>Deposit</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="bookingsTableBody">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="receiptModal" class="modal">
        <div class="modal-content">
            <h3>Proof of Payment</h3>
            <img id="receiptImage" src="" alt="Receipt">
            <button id="closeModalBtn" class="close-btn">Close</button>
        </div>
    </div>

    <script src="/assets/js/dashboard.js"></script>
</body>
</html>
